<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Hey, a question for you!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:         #ff4d6d;
    --blush:        #ffb3c1;
    --glass-bg:     rgba(255,255,255,0.11);
    --glass-border: rgba(255,255,255,0.26);
  }

  body {
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(ellipse at 20% 30%, #a4133c 0%, #590d22 40%, #1a0010 100%);
    display: flex; align-items: center; justify-content: center;
  }

  /* ── floating hearts bg ── */
  #hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bg-heart {
    position: absolute; bottom: -60px; opacity: 0;
    animation: floatUp linear infinite; filter: blur(0.5px);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-10deg) scale(1);   opacity: 0; }
    10%  { opacity: 0.55; }
    90%  { opacity: 0.25; }
    100% { transform: translateY(-110vh) rotate(15deg) scale(1.3); opacity: 0; }
  }

  /* ── Card ── */
  #card {
    position: relative; z-index: 10;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 48px 44px 44px;
    max-width: 500px; width: 92vw;
    text-align: center;
    box-shadow: 0 8px 60px rgba(255,77,109,0.22), 0 2px 12px rgba(0,0,0,0.3);
    animation: cardIn 0.8s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.84) translateY(28px); }
    to   { opacity:1; transform: scale(1)    translateY(0); }
  }

  .icon {
    font-size: 3.6rem; display: block; margin-bottom: 16px;
    animation: pulse 1.8s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(255,77,109,0.65));
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.5rem, 5vw, 2.1rem);
    color: #fff; margin-bottom: 8px;
    text-shadow: 0 2px 16px rgba(255,77,109,0.45);
  }
  .sub {
    font-size: 0.95rem; color: var(--blush); margin-bottom: 28px;
    font-style: italic; line-height: 1.5;
  }

  /* ── Input ── */
  #name-input {
    width: 100%; padding: 14px 20px;
    border-radius: 50px; border: 1.5px solid var(--glass-border);
    background: rgba(255,255,255,0.1);
    color: #fff; font-size: 1rem; outline: none;
    font-family: inherit; margin-bottom: 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }
  #name-input::placeholder { color: rgba(255,179,193,0.55); }
  #name-input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(255,77,109,0.2);
  }

  /* ── Buttons ── */
  .btn-primary {
    padding: 13px 44px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, #ff4d6d, #c9184a);
    color: #fff; font-size: 1rem; cursor: pointer;
    font-family: inherit; letter-spacing: 0.04em;
    box-shadow: 0 4px 20px rgba(255,77,109,0.4);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn-primary:hover  { transform: scale(1.06); box-shadow: 0 6px 28px rgba(255,77,109,0.55); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Option cards ── */
  .options {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 24px;
  }
  .opt-btn {
    padding: 13px 20px; border-radius: 16px;
    border: 1.5px solid var(--glass-border);
    background: rgba(255,255,255,0.07);
    color: #fff; font-size: 0.97rem; cursor: pointer;
    font-family: inherit; letter-spacing: 0.02em;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    text-align: left; display: flex; align-items: center; gap: 12px;
  }
  .opt-btn:hover { background: rgba(255,77,109,0.18); border-color: var(--rose); transform: scale(1.02); }
  .opt-btn.selected {
    background: rgba(255,77,109,0.3);
    border-color: var(--rose);
    box-shadow: 0 0 0 2px rgba(255,77,109,0.35);
  }
  .opt-icon { font-size: 1.3rem; }

  /* ── Screen transitions ── */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeSlideIn 0.45s cubic-bezier(.16,1,.3,1) both; }
  @keyframes fadeSlideIn {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Result screen ── */
  #result-msg {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.3rem, 4.5vw, 1.9rem);
    color: #fff; line-height: 1.4; margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(255,77,109,0.6);
  }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed; border-radius: 2px; pointer-events: none;
    z-index: 110; animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  .cel-heart {
    position: fixed; pointer-events: none; z-index: 105;
    animation: floatUp linear forwards;
  }

  /* spinner */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<div id="card">

  <!-- Screen 1: Name -->
  <div class="screen active" id="screen-name">
    <span class="icon">👋</span>
    <h2>Hey there!</h2>
    <p class="sub">What's your name?</p>
    <input id="name-input" type="text" placeholder="Enter your name..." maxlength="30" autocomplete="off">
    <br>
    <button class="btn-primary" id="btn-continue">Continue →</button>
  </div>

  <!-- Screen 2: Greeting -->
  <div class="screen" id="screen-greeting">
    <span class="icon">💕</span>
    <h2 id="greeting-text">Hi!</h2>
    <p class="sub">Shoeb has something<br>to ask you...</p>
  </div>

  <!-- Screen 3: Options -->
  <div class="screen" id="screen-question">
    <span class="icon" id="q-icon">🤔</span>
    <h2>What is Shoeb to you?</h2>
    <p class="sub" style="margin-bottom:20px">Pick one honestly 😊</p>
    <div class="options">
      <button class="opt-btn" data-value="Just a Friend">    <span class="opt-icon">👫</span> Just a Friend</button>
      <button class="opt-btn" data-value="Best Friend">      <span class="opt-icon">💪</span> Best Friend</button>
      <button class="opt-btn" data-value="Enemy">            <span class="opt-icon">😠</span> Enemy</button>
      <button class="opt-btn" data-value="Crush">            <span class="opt-icon">😍</span> Crush</button>
      <button class="opt-btn" data-value="Lover">            <span class="opt-icon">💕</span> Lover</button>
    </div>
    <button class="btn-primary" id="btn-submit" style="display:none">Submit 💌</button>
  </div>

  <!-- Screen 4: Result -->
  <div class="screen" id="screen-result">
    <span class="icon" id="result-icon">🎉</span>
    <p id="result-msg"></p>
    <p class="sub" style="margin-top:10px" id="result-sub"></p>
  </div>

</div>

<script>
/* ── Floating hearts ── */
(function() {
  const c = document.getElementById('hearts-bg');
  const e = ['💕','💖','💗','💓','♥','❤️','🌸','💞'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('span');
    el.className = 'bg-heart';
    el.textContent = e[Math.floor(Math.random() * e.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    c.appendChild(el);
  }
})();

/* ── Screen switcher ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Screen 1: Name ── */
let userName = '';
const nameInput = document.getElementById('name-input');
const btnContinue = document.getElementById('btn-continue');

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnContinue.click(); });

btnContinue.addEventListener('click', () => {
  const val = nameInput.value.trim();
  if (!val) { nameInput.focus(); nameInput.style.borderColor = '#ff4d6d'; return; }
  userName = val;
  document.getElementById('greeting-text').textContent = 'Hi ' + userName + '! 😊';
  showScreen('screen-greeting');
  setTimeout(() => showScreen('screen-question'), 2200);
});

/* ── Screen 3: Options ── */
let selectedOption = '';

document.querySelectorAll('.opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedOption = btn.dataset.value;
    document.getElementById('btn-submit').style.display = 'inline-block';
  });
});

/* ── Submit ── */
document.getElementById('btn-submit').addEventListener('click', async () => {
  if (!selectedOption) return;

  const submitBtn = document.getElementById('btn-submit');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Sending...';

  // ── FORMSPREE ENDPOINT ── replace the URL below with your own
  const FORMSPREE_URL = 'https://formspree.io/f/YOUR_FORM_ID';

  try {
    await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name: userName, answer: selectedOption }),
    });
  } catch(e) { /* show result even if fetch fails */ }

  showResult();
});

/* ── Result messages ── */
const results = {
  'Just a Friend':  { icon: '😊', msg: userName + ' sees Shoeb as just a friend!',         sub: 'That\'s totally fine, Shoeb values your friendship 💙',      confetti: false },
  'Best Friend':    { icon: '🎉', msg: userName + ' is the Best Friend of Shoeb! 💪',       sub: 'Best friends forever! 🥹💕',                                  confetti: true  },
  'Enemy':          { icon: '😅', msg: userName + ' sees Shoeb as an enemy... 😬',          sub: 'Shoeb will win you over someday! 😄',                          confetti: false },
  'Crush':          { icon: '😍', msg: userName + ' has a crush on Shoeb! 😍',              sub: 'Awww this is so cute 💕',                                      confetti: true  },
  'Lover':          { icon: '💕', msg: userName + ' is Shoeb\'s Lover! 🔥💕',              sub: 'You two are made for each other ✨',                            confetti: true  },
};

function showResult() {
  const r = results[selectedOption] || results['Just a Friend'];
  // update name in result (in case it wasn't set yet when object was created)
  document.getElementById('result-icon').textContent = r.icon;
  document.getElementById('result-msg').textContent  = r.msg.replace(results[selectedOption]?.msg.split(' ')[0], userName);
  document.getElementById('result-sub').textContent  = r.sub;
  showScreen('screen-result');
  if (r.confetti) { launchConfetti(); launchCelHearts(); }
}

function launchConfetti() {
  const colors = ['#ff4d6d','#ff8fa3','#ffb3c1','#fff','#ffd6e0','#c9184a','#ffccd5'];
  for (let i = 0; i < 120; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;top:-10px;width:${6+Math.random()*9}px;height:${6+Math.random()*9}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.8+Math.random()*2.2}s;animation-delay:${Math.random()*.8}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

function launchCelHearts() {
  const e = ['💖','💕','💗','💓','🎉','✨','🌸'];
  for (let i = 0; i < 24; i++) {
    const el = document.createElement('span');
    el.className = 'cel-heart';
    el.textContent = e[Math.floor(Math.random()*e.length)];
    el.style.cssText = `left:${Math.random()*100}vw;bottom:-40px;font-size:${1.2+Math.random()*1.8}rem;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*1.2}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
}
</script>
</body>
</html>
