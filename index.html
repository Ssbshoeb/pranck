<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 A Question For You...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:         #ff4d6d;
    --blush:        #ffb3c1;
    --glass-bg:     rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.28);
  }

  body {
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(ellipse at 20% 30%, #a4133c 0%, #590d22 40%, #1a0010 100%);
    display: flex; align-items: center; justify-content: center;
    cursor: default;
  }

  #hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bg-heart {
    position: absolute; bottom: -60px; font-size: 1.4rem; opacity: 0;
    animation: floatUp linear infinite; filter: blur(0.5px);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-10deg) scale(1);   opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-110vh) rotate(15deg) scale(1.3); opacity: 0; }
  }

  /* ── Card ── */
  #card {
    position: relative; z-index: 10;
    background: var(--glass-bg);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 48px 52px 44px;
    max-width: 520px; width: 90vw;
    text-align: center;
    box-shadow: 0 8px 60px rgba(255,77,109,0.25), 0 2px 12px rgba(0,0,0,0.3);
    animation: cardIn 0.9s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.82) translateY(30px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .main-icon {
    font-size: 4.2rem; display: block; margin-bottom: 18px;
    animation: pulse 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(255,77,109,0.7));
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  /* ── Step 1: teaser ── */
  #teaser-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: #fff;
    margin-bottom: 32px;
    font-style: italic;
    text-shadow: 0 2px 14px rgba(255,77,109,0.4);
    line-height: 1.5;
  }

  #btn-reveal {
    padding: 14px 40px; border-radius: 50px; border: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1rem; cursor: pointer; letter-spacing: 0.04em;
    background: linear-gradient(135deg, #ff4d6d, #c9184a);
    color: #fff;
    box-shadow: 0 4px 22px rgba(255,77,109,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  #btn-reveal:hover { transform: scale(1.07); box-shadow: 0 6px 30px rgba(255,77,109,0.6); }
  #btn-reveal:active { transform: scale(0.97); }

  /* ── Step 2: question (hidden initially) ── */
  #step2 {
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    display: none;
  }
  #step2.visible { opacity: 1; transform: translateY(0); display: block; }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.7rem, 5vw, 2.4rem);
    font-weight: 700; color: #fff; line-height: 1.25; margin-bottom: 10px;
    text-shadow: 0 2px 18px rgba(255,77,109,0.5);
  }

  #plea {
    font-size: 1rem; color: var(--blush);
    letter-spacing: 0.04em; margin-bottom: 10px;
    min-height: 1.4em; transition: opacity 0.2s; font-style: italic;
  }
  #counter {
    font-size: 0.78rem; color: rgba(255,179,193,0.55);
    margin-bottom: 32px; min-height: 1.2em; letter-spacing: 0.05em;
  }

  .btn-wrap { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; align-items: center; }

  .btn {
    padding: 14px 36px; border-radius: 50px; border: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1rem; font-weight: 400; letter-spacing: 0.04em;
    cursor: pointer; white-space: nowrap;
  }

  #btn-accept {
    background: linear-gradient(135deg, #ff4d6d, #c9184a);
    color: #fff;
    box-shadow: 0 4px 22px rgba(255,77,109,0.45);
    transition: transform 0.3s cubic-bezier(.16,1,.3,1), font-size 0.3s, padding 0.3s, box-shadow 0.3s;
  }
  #btn-accept:hover { transform: scale(1.07); box-shadow: 0 6px 30px rgba(255,77,109,0.6); }
  #btn-accept:active { transform: scale(0.97); }

  #btn-reject {
    background: rgba(255,255,255,0.08);
    color: var(--blush);
    border: 1px solid rgba(255,179,193,0.35);
    transition: none; z-index: 20;
  }
  #btn-reject.escaped { position: fixed; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px) rotate(-5deg); }
    40%     { transform: translateX(6px)  rotate(5deg); }
    60%     { transform: translateX(-4px) rotate(-3deg); }
    80%     { transform: translateX(4px)  rotate(3deg); }
  }
  .shaking { animation: shake 0.4s ease both !important; }

  /* ── Celebration ── */
  #celebration {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(ellipse at 50% 40%, #a4133c 0%, #590d22 50%, #1a0010 100%);
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  #celebration.show { opacity: 1; visibility: visible; pointer-events: all; }

  #celebration h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(2rem, 7vw, 3.6rem); color: #fff;
    text-shadow: 0 0 40px rgba(255,77,109,0.9);
    text-align: center; padding: 0 20px;
    transform: scale(0.8); transition: transform 0.5s cubic-bezier(.16,1,.3,1) 0.1s;
  }
  #celebration.show h2 { transform: scale(1); }

  #celebration p {
    margin-top: 16px; color: var(--blush); font-size: 1.15rem;
    opacity: 0; transition: opacity 0.4s ease 0.3s;
  }
  #celebration.show p { opacity: 1; }

  .confetti-piece {
    position: fixed; width: 10px; height: 10px; border-radius: 2px;
    pointer-events: none; z-index: 110; animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  .cel-heart {
    position: fixed; font-size: 2rem; pointer-events: none; z-index: 105;
    animation: floatUp linear forwards;
  }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<div id="card">
  <span class="main-icon" id="main-icon">💕</span>

  <!-- Step 1: teaser -->
  <div id="step1">
    <p id="teaser-text">i have something important<br>to ask you...</p>
    <button id="btn-reveal">What is it? 🤍</button>
  </div>

  <!-- Step 2: the real question (hidden) -->
  <div id="step2">
    <h1>Will You Be My Bestfriend?</h1>
    <p id="plea"></p>
    <p id="counter"></p>
    <div class="btn-wrap">
      <button class="btn" id="btn-accept">Yes, of course! 💖</button>
      <button class="btn" id="btn-reject">No way...</button>
    </div>
  </div>
</div>

<div id="celebration">
  <h2>Yayyyy! I knew it! 🎉💕</h2>
  <p>You just made everything so much better ✨</p>
</div>

<script>
/* ── Floating hearts ── */
(function() {
  const container = document.getElementById('hearts-bg');
  const emojis = ['💕','💖','💗','💓','♥','❤️','🌸','💞'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('span');
    el.className = 'bg-heart';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (0.8 + Math.random() * 1.6) + 'rem';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    container.appendChild(el);
  }
})();

/* ── Step 1 → Step 2 reveal ── */
document.getElementById('btn-reveal').addEventListener('click', function() {
  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');

  step1.style.opacity = '0';
  step1.style.transition = 'opacity 0.3s ease';

  setTimeout(() => {
    step1.style.display = 'none';
    step2.style.display = 'block';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        step2.classList.add('visible');
      });
    });
  }, 300);
});

/* ── Reject escape logic ── */
const rejectBtn = document.getElementById('btn-reject');
const acceptBtn = document.getElementById('btn-accept');
const pleaEl    = document.getElementById('plea');
const counterEl = document.getElementById('counter');
const iconEl    = document.getElementById('main-icon');
let escapeCount = 0;

const pleaMsgs = [
  "please... don't do that 🥺",
  "come on, just say yes! 😭",
  "you're breaking my heart... 💔",
  "i'll literally cry 😢",
  "the button will keep running, just accept it 😅",
  "pleaseeeee 🙏",
  "ok fine, keep trying... 😔",
  "i'm not giving up! 💪",
  "that button will NEVER let you click it 😤",
  "just say yes already!! 😩",
  "i made this whole page for you 🥺",
  "you're so mean to me 😭💕",
  "destiny says YES 💫",
  "the universe wants you to click Yes ✨",
  "resistance is futile 💕",
];
const icons = ['💕','😢','🥺','😭','💔','🙏','😩','💕','😭','🥺'];

function getRandomPos() {
  const margin = 60;
  const btnW = rejectBtn.offsetWidth  || 130;
  const btnH = rejectBtn.offsetHeight || 48;
  return {
    x: margin + Math.random() * (window.innerWidth  - btnW - margin * 2),
    y: margin + Math.random() * (window.innerHeight - btnH - margin * 2),
  };
}

function escapeReject() {
  escapeCount++;

  if (!rejectBtn.classList.contains('escaped')) {
    const rect = rejectBtn.getBoundingClientRect();
    rejectBtn.style.top   = rect.top  + 'px';
    rejectBtn.style.left  = rect.left + 'px';
    rejectBtn.style.width = rect.width + 'px';
    rejectBtn.classList.add('escaped');
  }

  const { x, y } = getRandomPos();
  rejectBtn.style.left = x + 'px';
  rejectBtn.style.top  = y + 'px';

  const msg = pleaMsgs[(escapeCount - 1) % pleaMsgs.length];
  pleaEl.style.opacity = '0';
  setTimeout(() => { pleaEl.textContent = msg; pleaEl.style.opacity = '1'; }, 150);

  counterEl.textContent = 'Failed attempts: ' + escapeCount + ' 😬';

  iconEl.classList.remove('shaking');
  void iconEl.offsetWidth;
  iconEl.style.animation = 'none';
  iconEl.classList.add('shaking');
  setTimeout(() => {
    iconEl.classList.remove('shaking');
    iconEl.style.animation = '';
    iconEl.textContent = icons[escapeCount % icons.length];
  }, 420);

  const scale = Math.min(1 + escapeCount * 0.12, 1.9);
  acceptBtn.style.transform = 'scale(' + scale + ')';
  acceptBtn.style.fontSize  = Math.min(1 + escapeCount * 0.06, 1.6) + 'rem';
}

rejectBtn.addEventListener('mouseover', escapeReject);
rejectBtn.addEventListener('touchstart', (e) => { e.preventDefault(); escapeReject(); }, { passive: false });

/* ── Accept → celebrate ── */
acceptBtn.addEventListener('click', celebrate);

function celebrate() {
  launchConfetti();
  launchCelHearts();
  document.getElementById('card').style.display = 'none';
  document.getElementById('celebration').classList.add('show');
}

function launchConfetti() {
  const colors = ['#ff4d6d','#ff8fa3','#ffb3c1','#fff','#ffd6e0','#c9184a','#ffccd5','#ff006e'];
  for (let i = 0; i < 140; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (6 + Math.random() * 10) + 'px';
    el.style.height = (6 + Math.random() * 10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.8 + Math.random() * 2.4) + 's';
    el.style.animationDelay    = (Math.random() * 0.8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

function launchCelHearts() {
  const emojis = ['💖','💕','💗','💓','🎉','✨','🌸','💞'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('span');
    el.className = 'cel-heart';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left   = Math.random() * 100 + 'vw';
    el.style.bottom = '-40px';
    el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
    el.style.animationDuration = (3 + Math.random() * 4) + 's';
    el.style.animationDelay    = (Math.random() * 1.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
}

document.getElementById('celebration').addEventListener('click', function() {
  this.classList.remove('show');
  document.getElementById('card').style.display = '';
  setTimeout(celebrate, 300);
});
</script>
</body>
</html>
